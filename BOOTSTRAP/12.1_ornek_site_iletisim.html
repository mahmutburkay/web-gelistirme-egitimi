    <div class="container">
        <h3 class="text-center mt-4 mb-4">KAYIT FORMU</h3>

        <form>

            <div class="row">

                <div class="col-sm">
                    <div class="form-group">
                        <label for="İsim">İsim Soyisim</label>
                        <input type="text" class="form-control" id="isimInput" aria-describedby="isimHelp">
                        <small id="isimHelp" class="form-text text-muted">Bu alan zorunludur.</small>
                      </div>
                </div>

                <div class="col-sm">
                    <div class="form-group">
                        <label for="sifre">Şifreniz</label>
                        <input type="password" class="form-control" id="sifre" aria-describedby="SifreHelp">
                        <small id="SifreHelp" class="form-text text-muted">Bu alan zorunludur.</small>
                      </div>
                </div>
                
            </div>
            







            <div class="row">

                <div class="col-sm">
                    <div class="form-group">
                        <label for="exampleInputEmail1">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1">
                    </div>
                </div>

                <div class="col-sm">
                    <div class="form-group">
                        <label for="sehir">Şehir Seçiniz :</label>
                        <select class="form-control" id="sehir">
                        <option>İstanbul</option>
                        <option>Ankara</option>
                        <option>İzmir</option>
                        <option>Samsun</option>
                        <option>Eskişehir</option>
                        </select>
                    </div>
                </div>

            </div>










            <div class="row">
                <div class="col-sm">
                    <div class="form-group">
                        <label for="file">Resminizi Seçiniz.</label>
                        <input type="file" class="form-control-file" id="file">
                    </div>
                </div>



                <div class="col">
                    <div class="col-sm">
                        <h5>Cinsiyetiniz</h5>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios1" value="option1" checked>
                            <label class="form-check-label" for="exampleRadios1">
                                Erkek
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios2" value="option2">
                            <label class="form-check-label" for="exampleRadios2">
                                Kız
                            </label>
                        </div>
                    </div>


                    <br>


                    <div class="col-sm">
                        <h5>Hobileriniz </h5>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="check1">
                            <label class="form-check-label" for="check1">
                            Kitap Okumak
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="check2">
                            <label class="form-check-label" for="check2">
                            Seyehat Etmek
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="check2">
                            <label class="form-check-label" for="check2">
                            Yazılımla Uğraşmak
                            </label>
                        </div>

                    </div>
                </div>

            </div>



            <br>

            <div class="row mb-4">
                <button type="submit" class="btn btn-success btn-block">Kaydet</button>
                <button type="reset" class="btn btn-secondary btn-block">Temizle</button>
            </div>

        </form>
