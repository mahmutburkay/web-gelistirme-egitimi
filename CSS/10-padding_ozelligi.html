<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-padding_ozelligi</title>
    <style>

        .kutu{
            background-color: blueviolet;
            width: 250px;
            height: 250px;
        }
        .h3{
            padding-left: 15px;
            padding-top: 20px;
        }
        .p{
            padding-top: 120px;
            padding-left: 5px;
            padding-right: 5px;
            color: #fff;
            text-align: right;
        }

    </style>
</head>
<body>
    <div class="kutu">

        <h3 class="h3">Mehmet Mahmut Burkay</h3>
        <p>Web Siteme Hoşgeldiniz</p>
        <p class="p">Telif Hakları Saklıdır</p>

    </div>
    
</body>
</html>
