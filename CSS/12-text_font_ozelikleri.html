<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-text_font_ozelikleri</title>
    <style>
        .metin{
            color: black;
            background-color: antiquewhite;
            text-align: center;
            font-weight: bold;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: underline;
            word-spacing: 10px;
        }
    </style>
</head>
<body>
<!-- 
    1-color
    2-background-color
    3-text-align ---- yazıyı hizalamak(ortalamak) için kullanılır
    4-font-weight --- kalınlığı bold ile
    5-font-family -----  yazı tipi
    6-font-style -----  italic yapma
    7-text-transform ----- tüm karakter büyük or küçük
    8-letter-spacing ----- harf arası boşluk ayarlamak
    9-text-decoration ----- yazı altını üstünü çizmek
    10-word-spacing ----- kelime arası boşluk
-->


    <p class="metin">Başarı bedel gerektirir.</p>





</body>
</html>
