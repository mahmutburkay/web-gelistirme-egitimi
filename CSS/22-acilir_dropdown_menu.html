<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-acilir_dropdown_menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        ul{
            list-style-type: none;
            width: 100%;
            background-color: #3f3f3f;
        }
        ul li:hover{
            transition: 0.5s;
            background-color: red;
        }

        ul li{
            display: inline-block;
            width: 100px;
            padding: 15px;
        }
        ul li a{
            text-decoration: none;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            /* font-weight: bold; */
        }
        /* 
        ul li:nth-child(1){
            background-color: #82CB73;
        } */
        i{
            padding-right: 10px;
        }

        #news-content{
            position: absolute;
            z-index: 1;
            display: none;
            margin-top: 15px;
            margin-left: -15px;
            width: 90px;
        }
        #news-content li{
            margin-left: -40px;
        }
        .news-li:hover #news-content{
            display: block;
        }

        #news2{
            display: none;
            position: absolute;
            z-index: 1;
            margin-left: 115px;
            margin-top: -33px;
            width: 90px;
        }

        .news2-li:hover #news2{
            display: block;
        }
        

    </style>

</head>
<body>
    
    <ul>
        <li><a href="#"><i class="fa-solid fa-house-user"></i>Home</a></li>
        <li class="news-li">
            <a href="#"><i class="fa-solid fa-newspaper"></i>News</a>
            
            <div id="news-content"><a href="#"></a>
                <ul>
                    <li style="display: block;"><a href="#">News 1</a></li>
                    <li class="news2-li" style="display: block;"><a href="#">News 2</a>
                        
                        <div id="news2">

                            <ul>
                                <li style="display: block;"><a href="#">Detail 1</a>
                                <li style="display: block;"><a href="#">Detail 2</a>
                                <li style="display: block;"><a href="#">Detail 3</a>
                                <li style="display: block;"><a href="#">Detail 4</a>
                            </ul>

                        </div>

                    </li>
                    <li style="display: block;"><a href="#">News 3</a></li>
                    <li style="display: block;"><a href="#">News 4</a></li>
                </ul>

            </div>

        </li>
        <li><a href="https://www.google.com/" target="_blank"><i class="fa-solid fa-address-card"></i>Contact</a></li>
        <li><a href="#"><i class="fa-regular fa-address-card"></i>About</a></li>
    </ul>

</body>
</html>
