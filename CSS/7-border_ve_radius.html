<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-border_ve_radius</title>
    <style>
        .kutu{
            background-color: lightblue;
            width: 300px;
            height: 300px;
            /* kalınlığı tipi rengi  */
            border: 7px ridge lightgray;
        }
        .kutu2 {
            background-color: lightgreen ;
            border-radius: 25px;
            width: 150px;
            height: 150px;
        }

    </style>
</head>
<body>
    <!--Border ve Radius Özellikleri 

    border tipleri

    dotted I
    dashed
    solid
    double
    groove
    ridge
    inset
    outset
    --> 

    <div class="kutu"></div>
    <br>
    <br>

    <div class="kutu2"></div>



</body>
</html>
