<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Table Etiketi</title>
</head>
<body>
    <table border="1">
        <tr>

        </tr>

        <tr>
            <td rowspan="2">Soyisim</td>
            <td>Burkay</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Basut</td>
            <td>23</td>
        </tr>
    </table>




    <br>
    <br>
    <br>


    <!-- tablo örnek  -->

    <table border="1" width="200" height="200">

            <th colspan="3">Product</th>
        </tr>

        <tr>
            <th>No</th>
            <th>P.Name</th>
            <th>P.Count</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Pen</td>
            <td rowspan="3">50</td>
        </tr>


        <tr>
            <td>2</td>
            <td>Book</td>
        </tr>


        <tr>
            <td>3</td>
            <td>Dust</td>

    </table>


</body>
</html>
